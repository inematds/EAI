<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dino Adventure World - EAI Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a4d2e; touch-action: none; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #2d6a4f 0%, #1a4d2e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .dino-walk { font-size: 80px; animation: walk 0.5s ease-in-out infinite; }
    @keyframes walk { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    #loading h1 { color: #95d5b2; font-family: 'Arial Black', sans-serif; font-size: 26px; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #loading p { color: #74c69d; font-family: Arial, sans-serif; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dino-walk">🦕</div>
    <h1>DINO ADVENTURE</h1>
    <p>Preparando a aventura...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
    });
  </script>
</body>
</html>
