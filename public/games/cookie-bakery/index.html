<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cookie Bakery Tycoon - EAI Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #8B4513; touch-action: none; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #D2691E 0%, #8B4513 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .cookie-spin { font-size: 80px; animation: spin 2s ease-in-out infinite; }
    @keyframes spin { 0%, 100% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.2); } }
    #loading h1 { color: #FFE4B5; font-family: 'Arial Black', sans-serif; font-size: 28px; margin-top: 20px; }
    #loading p { color: #FFDAB9; font-family: Arial, sans-serif; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="cookie-spin">🍪</div>
    <h1>COOKIE BAKERY TYCOON</h1>
    <p>Aquecendo o forno...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
    });
  </script>
</body>
</html>
