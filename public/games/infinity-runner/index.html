<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infinity Runner EAI - EAI Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .runner { font-size: 60px; animation: run 0.5s ease-in-out infinite; }
    @keyframes run { 0%, 100% { transform: translateX(-30px); } 50% { transform: translateX(30px); } }
    #loading h1 { color: #00ff88; font-family: 'Arial Black', sans-serif; font-size: 28px; margin-top: 20px; text-shadow: 0 0 20px #00ff88; }
    #loading p { color: #4ECDC4; font-family: Arial, sans-serif; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="runner">🏃</div>
    <h1>INFINITY RUNNER</h1>
    <p>Preparando a pista...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
    });
  </script>
</body>
</html>
