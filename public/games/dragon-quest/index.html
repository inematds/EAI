<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dragon Quest Legends - EAI Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a0a; touch-action: none; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #2d1b1b 0%, #1a0a0a 50%, #0f0505 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .dragon-fly { font-size: 80px; animation: dragonFly 1s ease-in-out infinite; }
    @keyframes dragonFly { 0%, 100% { transform: translateY(0) scaleX(1); } 50% { transform: translateY(-15px) scaleX(-1); } }
    #loading h1 { color: #ff4500; font-family: 'Arial Black', sans-serif; font-size: 22px; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #loading p { color: #ffd700; font-family: Arial, sans-serif; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dragon-fly">🐉</div>
    <h1>DRAGON QUEST LEGENDS</h1>
    <p>Despertando os dragões...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
    });
  </script>
</body>
</html>
