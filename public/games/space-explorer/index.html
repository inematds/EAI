<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Space Explorer Kids - EAI Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; touch-action: none; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1a 50%, #050510 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .rocket-fly { font-size: 80px; animation: fly 1s ease-in-out infinite; }
    @keyframes fly { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
    #loading h1 { color: #ffd700; font-family: 'Arial Black', sans-serif; font-size: 24px; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #loading p { color: #87ceeb; font-family: Arial, sans-serif; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="rocket-fly">🚀</div>
    <h1>SPACE EXPLORER KIDS</h1>
    <p>Preparando para decolar...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
    });
  </script>
</body>
</html>
