<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometria Aventura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d18; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #loading { position: fixed; inset: 0; background: #0d0d18; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #loading h1 { color: #8b5cf6; font-size: 2em; margin-bottom: 0.5em; }
        #loading p { color: rgba(255,255,255,0.6); }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(139,92,246,0.3); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 1em; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <h1>📐 Geometria Aventura</h1>
        <p>Carregando...</p>
        <div class="spinner"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
